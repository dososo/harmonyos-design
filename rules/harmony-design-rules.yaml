  rationale: 鸿蒙全场景体验依赖设备差异与跨设备一致性，脱离上下文的统一答案容易在其他终端失效。
  normativity: SHOULD
  severity: major
  source_tier: H2
  value_kind: NONE
  scope:
    platforms: &id001
    - all
    windows: &id002
    - all
    inputs: &id003
    - all
    api_min: null
    api_max: null
    exclusions: &id004 []
  source:
    id: OH-UX-PRINCIPLES
    locator: 设计原则与设计要点
    last_verified: '2026-07-11'
  evidence:
    inspect:
    - 检查报告是否包含上下文卡
    - 检查是否静默假设手机触摸环境
    good:
    - 已复用用户信息，并把缺失条件列为假设
    bad:
    - 未询问设备就给出单一手机布局
  arkui:
    preferred: []
    alternatives: []
    cautions: []
