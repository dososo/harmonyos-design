- id: HD-FOUNDATION-002
  title: 系统控件与原生能力优先
  category: foundation
  statement: 优先使用系统控件、默认状态和 ArkUI 原生动画；自定义必须证明系统能力不足，并不得削弱状态、无障碍、可打断性和性能。
  rationale: 系统组件已经承担多设备状态、输入归一和可访问性责任，重复覆盖会造成行为冲突和维护负担。
  normativity: SHOULD
  severity: major
  source_tier: H2
  value_kind: NONE
  scope:
    platforms: *id001
    windows: *id002
    inputs: *id003
    api_min: null
    api_max: null
    exclusions: *id004
  source:
    id: OH-MULTIMODAL-COMPONENTS
    locator: 多态控件特点与控件状态
    last_verified: '2026-07-11'
  evidence:
    inspect:
    - 识别自定义 Button、Tabs、Navigation 和滚动行为
    - 检查是否重复叠加系统已有反馈
    good:
    - 系统 Button 保留默认按压，业务只增加必要语义
    bad:
    - 为了统一外观覆盖所有系统状态和转场
  arkui:
    preferred:
    - Button
    - Tabs
    - Navigation
    - List
