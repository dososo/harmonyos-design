- id: HD-ADAPT-001
  title: 适配方案必须命名具体策略
  category: adaptation
  statement: 跨设备方案必须明确采用拉伸、均分、缩放、延伸、隐藏、折行、缩进、挪移、重复、分栏或导航转换中的一种或多种，而不能只写“做响应式”。
  rationale: 具体策略可被设计、实现和验证，笼统的响应式要求无法指导 Coding Agent。
  normativity: SHOULD
  severity: major
  source_tier: H2
