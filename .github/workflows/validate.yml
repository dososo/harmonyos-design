name: 校验 HarmonyOS-Design

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: pip install -e ".[dev]"
      - name: 校验仓库
        run: python scripts/validate_repo.py
      - name: 运行测试
        run: pytest
